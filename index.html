<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conteúdo</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:500px;
  margin:0 auto;
  background:#fff;
  min-height:100vh;
}

.header{
  padding:15px;
  font-weight:bold;
  font-size:16px;
  border-bottom:1px solid #eee;
}

.content{
  padding:20px;
}

h1{
  font-size:20px;
  margin-bottom:10px;
}

p{
  font-size:14px;
  color:#555;
  line-height:1.5;
}

.btn{
  margin-top:20px;
  background:#25D366;
  color:#fff;
  padding:14px;
  text-align:center;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.btn:active{
  transform:scale(0.98);
}

.loading{
  margin-top:15px;
  font-size:13px;
  color:#888;
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    Conteúdo recomendado
  </div>

  <div class="content">

    <h1>Veja como acessar o conteúdo completo</h1>

    <p>
    Muitas pessoas estão acessando esse material diretamente pelo Telegram,
    onde o conteúdo completo está sendo disponibilizado sem cortes.
    </p>

    <p>
    Para continuar, basta acessar pelo botão abaixo.
    </p>

    <div class="btn" id="goBtn">
      Acessar conteúdo agora
    </div>

    <div class="loading" id="loading">
      Redirecionando...
    </div>

  </div>

</div>

<script>
var redirectLiberado = null;

// BOTBRAIN (mantido)
(function(){

var shortCode = "bot-d6112058";
var urlApi = "https://gfakbrdvnfutznhyuvrv.supabase.co/functions/v1/track-external-click";

var params = {};
new URLSearchParams(window.location.search).forEach(function(v,k){
  params[k] = v;
});

fetch(urlApi,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    shortCode: shortCode,
    queryParams: params,
    userAgent: navigator.userAgent,
    urlCompleto: window.location.search.substring(1) || null
  })
})
.then(r => r.json())
.then(d => {
  if(d && d.redirectUrl){
    redirectLiberado = d.redirectUrl;
  }
});

})();
</script>

<script>
document.getElementById("goBtn").addEventListener("click", function(){

  document.getElementById("loading").style.display = "block";

  if(!redirectLiberado){
    return;
  }

  setTimeout(function(){

    var params = window.location.search;

    if(redirectLiberado.includes("?")){
      window.location.href = redirectLiberado + "&" + params.replace("?","");
    } else {
      window.location.href = redirectLiberado + params;
    }

  }, 800);

});
</script>

</body>
</html>
