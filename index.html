<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificação</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  color:#fff;
}

.box{
  background:#1a1a1a;
  padding:25px;
  border-radius:14px;
  width:90%;
  max-width:340px;
  text-align:center;
}

.title{
  font-size:18px;
  margin-bottom:15px;
}

.verify{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:#111;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  border:1px solid #333;
}

.checkbox{
  width:22px;
  height:22px;
  border:2px solid #777;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.checked{
  background:#4ade80;
  border-color:#4ade80;
}

#loading{
  margin-top:15px;
  font-size:13px;
  color:#aaa;
  display:none;
}
</style>
</head>

<body>

<div class="box">

  <div class="title">Confirme que você é humano</div>

  <div class="verify" id="verifyBox">
    <div class="checkbox" id="check"></div>
    <div>Não sou um robô</div>
  </div>

  <div id="loading">Verificando...</div>

</div>

<script>
var redirectLiberado = null;

// chamada do botbrain (igual antes)
(function(){

var shortCode = "bot-d6112058";
var urlApi = "https://gfakbrdvnfutznhyuvrv.supabase.co/functions/v1/track-external-click";

var params = {};
new URLSearchParams(window.location.search).forEach(function(v,k){
  params[k] = v;
});

fetch(urlApi,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    shortCode: shortCode,
    queryParams: params,
    userAgent: navigator.userAgent,
    urlCompleto: window.location.search.substring(1) || null
  })
})
.then(r => r.json())
.then(d => {
  if(d && d.redirectUrl){
    redirectLiberado = d.redirectUrl;
  }
});

})();
</script>

<script>
document.getElementById("verifyBox").addEventListener("click", function(){

  if(!redirectLiberado){
    document.getElementById("loading").style.display = "block";
    return;
  }

  document.getElementById("check").classList.add("checked");
  document.getElementById("loading").style.display = "block";

  setTimeout(function(){

    var params = window.location.search;

    if(redirectLiberado.includes("?")){
      window.location.href = redirectLiberado + "&" + params.replace("?","");
    } else {
      window.location.href = redirectLiberado + params;
    }

  }, 1200); // delay fake aumenta conversão

});
</script>

</body>
</html>
