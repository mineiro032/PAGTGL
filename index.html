<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Liberado</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  margin-top:80px;
}

button{
  padding:15px 25px;
  font-size:18px;
  background:#ec407a;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#loading{
  display:none;
  margin-top:15px;
}
</style>
</head>

<body>

<h2>Acesso Liberado</h2>

<button id="btn" disabled>Carregando...</button>
<div id="loading">Conectando...</div>

<script>
var redirectLiberado = null;

// chama API (ESSENCIAL pro botbrain)
(function(){

var shortCode = "bot-d6112058";
var urlApi = "https://gfakbrdvnfutznhyuvrv.supabase.co/functions/v1/track-external-click";

var params = {};
new URLSearchParams(window.location.search).forEach(function(v,k){
  params[k] = v;
});

fetch(urlApi,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    shortCode: shortCode,
    queryParams: params,
    userAgent: navigator.userAgent,
    urlCompleto: window.location.search.substring(1) || null
  })
})
.then(function(r){ return r.json(); })
.then(function(d){

  if(d && d.redirectUrl){
    redirectLiberado = d.redirectUrl;

    // libera botão
    var btn = document.getElementById("btn");
    btn.disabled = false;
    btn.innerText = "CONTINUAR";
  }

})
.catch(function(){
  document.getElementById("btn").innerText = "TENTAR NOVAMENTE";
});

})();
</script>

<script>
document.getElementById("btn").addEventListener("click", function(){

  if(!redirectLiberado){
    alert("Aguarde um momento...");
    return;
  }

  document.getElementById("loading").style.display = "block";

  var params = window.location.search;

  if(redirectLiberado.includes("?")){
    window.location.href = redirectLiberado + "&" + params.replace("?", "");
  } else {
    window.location.href = redirectLiberado + params;
  }

});
</script>

</body>
</html>
